<button
  [type]="type"
  class="btn btn-{{ variant }}"
  [class.btn-full]="fullWidth"
  [class.btn-loading]="loading"
  [disabled]="disabled || loading"
  [attr.data-testid]="testId"
  (click)="handleClick($event)"
>
  @if (loading) {
    <span class="btn-spinner material-symbols-outlined" aria-hidden="true">progress_activity</span>
  } @else if (icon) {
    <span class="btn-icon material-symbols-outlined" aria-hidden="true">{{ icon }}</span>
  }
  
  <span class="btn-content">
    <ng-content></ng-content>
  </span>
</button>
